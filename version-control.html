<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version Control Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        main: 'var(--bg-main)',
                        card: 'var(--bg-card)',
                        surface: 'var(--bg-surface)',
                        primary: 'var(--primary)',
                        muted: 'var(--text-muted)',
                        border: 'var(--border-color)',
                        focus: 'var(--border-focus)',
                    },
                    textColor: { main: 'var(--text-main)' }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-main: #f9fafb;
            --bg-card: #ffffff;
            --bg-surface: #f3f4f6;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --border-focus: #3b82f6;
            --primary: #3b82f6;
        }
        html.dark {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-surface: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #475569;
            --border-focus: #60a5fa;
            --primary: #3b82f6;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            transition: background-color 0.2s, color 0.2s;
        }
        .input-base {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            transition: all 0.2s;
        }
        .input-base:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 1px var(--border-focus);
        }
        .mono-output {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            padding: 0.75rem;
            font-size: 0.875rem;
            word-break: break-all;
        }
        .peer:hover ~ .info-tooltip,
        .info-tooltip:hover {
            display: flex;
        }
        .copy-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .nav-tab-active {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-weight: 600;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .nav-tab-idle {
            color: var(--text-muted);
        }
        .nav-tab-idle:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">

        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-card p-4 rounded-xl border border-border shadow-sm">
            <div class="flex items-center gap-3 flex-wrap">
                <a href="index.html" class="text-base font-bold text-main whitespace-nowrap hover:text-primary transition-colors">Helper Tools</a>
                <div class="flex items-center bg-surface rounded-lg p-0.5 border border-border gap-0.5">
                    <span class="nav-tab-active px-3 py-1 rounded-md text-sm flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                        Version Control
                    </span>
                    <a href="release-notes.html" class="nav-tab-idle px-3 py-1 rounded-md text-sm transition-colors flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Release Notes
                    </a>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                <input type="text" id="username" placeholder="Username" class="input-base rounded-md px-3 py-1.5 text-sm w-32" title="Your username for branch names">
                <input type="text" id="global-prefix" placeholder="SPRK-" class="input-base rounded-md px-3 py-1.5 text-sm w-24 uppercase" title="Global ticket prefix">
                <button id="forget-btn" class="text-xs text-muted hover:text-red-400 underline transition-colors hidden whitespace-nowrap" title="Clear saved settings">Forget</button>
                <div class="h-6 w-px bg-border mx-1"></div>
                <button id="theme-toggle" class="p-1.5 rounded-md text-muted hover:text-main hover:bg-surface transition-colors" title="Toggle Dark/Light Mode">
                    <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg id="icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-2 gap-8">

            <!-- LEFT COLUMN: Inputs -->
            <div class="space-y-8 bg-card p-6 rounded-xl border border-border shadow-sm">

                <!-- 1. Change Type -->
                <div class="space-y-3">
                    <label class="block text-sm font-bold uppercase tracking-wider text-muted">1. Change Type</label>
                    <div id="type-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
                </div>

                <!-- 2. Tickets -->
                <div class="space-y-3">
                    <div class="flex justify-between items-end">
                        <label class="block text-sm font-bold uppercase tracking-wider text-muted">2. Tickets</label>
                        <label class="flex items-center gap-2 text-sm cursor-pointer">
                            <input type="checkbox" id="no-ticket" class="rounded border-border text-primary">
                            <span>No ticket for this branch</span>
                        </label>
                    </div>
                    <div id="ticket-section" class="flex flex-col gap-3">
                        <div id="ticket-rows" class="flex flex-col gap-2"></div>
                        <button id="add-ticket-btn" class="text-sm font-medium self-start text-muted hover:text-main hover:underline transition-colors">+ Add another ticket</button>
                    </div>
                </div>

                <!-- 3. Description -->
                <div class="space-y-3">
                    <div class="flex justify-between items-end">
                        <label class="block text-sm font-bold uppercase tracking-wider text-muted">3. Description</label>
                        <label class="flex items-center gap-2 text-sm cursor-pointer text-primary font-medium">
                            <input type="checkbox" id="mark-release" class="rounded border-border text-primary">
                            <span>Mark as Release PR</span>
                        </label>
                    </div>
                    <input type="text" id="desc-input" class="input-base w-full rounded-md p-3" placeholder="e.g. Add user referral program API...">
                </div>
            </div>

            <!-- RIGHT COLUMN: Outputs -->
            <div class="space-y-6 lg:sticky lg:top-8 self-start">

                <div class="bg-card p-5 rounded-xl border border-border shadow-sm">
                    <div class="flex justify-between items-end mb-2">
                        <label class="font-bold text-sm text-muted uppercase tracking-wider">Branch Name</label>
                        <button class="copy-btn text-xs bg-primary hover:bg-blue-600 text-white py-1 px-3 rounded transition-colors" data-target="out-branch">Copy</button>
                    </div>
                    <div id="out-branch" class="mono-output min-h-[3rem] flex items-center"></div>
                </div>

                <div class="bg-card p-5 rounded-xl border border-border shadow-sm">
                    <div class="flex justify-between items-end mb-2">
                        <label class="font-bold text-sm text-muted uppercase tracking-wider">Commit Message</label>
                        <button class="copy-btn text-xs bg-primary hover:bg-blue-600 text-white py-1 px-3 rounded transition-colors" data-target="out-commit">Copy</button>
                    </div>
                    <div id="out-commit" class="mono-output min-h-[3rem] flex items-center whitespace-pre-wrap"></div>
                    <div id="commit-multi-ticket-note" class="text-xs text-muted mt-3 hidden bg-surface p-2.5 rounded border border-border flex items-start gap-2">
                        <svg class="w-4 h-4 text-primary shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span>Note: You will need to commit for each ticket individually. The message above only mentions the first ticket.</span>
                    </div>
                </div>

                <div class="bg-card p-5 rounded-xl border border-border shadow-sm">
                    <div class="flex justify-between items-end mb-2">
                        <label class="font-bold text-sm text-muted uppercase tracking-wider">PR Title</label>
                        <button class="copy-btn text-xs bg-primary hover:bg-blue-600 text-white py-1 px-3 rounded transition-colors" data-target="out-pr">Copy</button>
                    </div>
                    <div id="out-pr" class="mono-output min-h-[3rem] flex items-center"></div>
                </div>

            </div>
        </main>

        <!-- Last Release Date + Tool Release Notes -->
        <div class="bg-card rounded-xl border border-border shadow-sm overflow-hidden">
            <div class="px-5 py-3.5 flex items-center gap-2.5 border-b border-border">
                <div class="p-1.5 rounded-lg bg-surface shrink-0">
                    <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <span class="text-sm font-semibold text-main">Last released: <span id="last-updated" class="font-normal text-muted"></span></span>
            </div>
            <div id="tool-changelog" class="px-5 py-4 space-y-4"></div>
        </div>

    </div>

    <script src="changelog.js"></script>
    <script src="shared.js?v=20260523-3"></script>
    <script>
        const changeTypes = [
            { id: 'feat',     title: 'feat',     sub: 'new feature' },
            { id: 'fix',      title: 'fix',      sub: 'bug fix' },
            { id: 'defect',   title: 'defect',   sub: 'pre-release QA' },
            { id: 'refactor', title: 'refactor', sub: 'code refactor' },
            { id: 'chore',    title: 'chore',    sub: 'config / general' },
            { id: 'docs',     title: 'docs',     sub: 'documentation' },
            { id: 'test',     title: 'test',     sub: 'tests' }
        ];

        const typeExamples = {
            feat:     ["Add Referral Program API", "Improve Onboarding Flow", "Add Intercom Field Abc", "Implement White Label App Branding"],
            fix:      ["Fix Token Caching Issue", "Handle Null Response From API", "Handle Missing CityId", "Fix Login Crash on Android"],
            defect:   ["Fix Signup Form Validation Error", "Handle Empty State on Dashboard", "Fix Date Picker Overflow"],
            refactor: ["Improve Sonar Config", "Extract Payment Logic Into Service", "Rename Auth Variables", "Split User Model"],
            chore:    ["Update Dependencies", "Configure White Label Build Pipeline", "Set Up Fastlane for CI", "Update Gitignore"],
            docs:     ["Update API Docs", "Add README Setup Guide", "Document Release Process"],
            test:     ["Add Unit Tests for Payment Service", "Refactor Auth Integration Tests", "Add Missing Edge Case Tests"]
        };

        const elUsername    = document.getElementById('username');
        const elGlobalPrefix = document.getElementById('global-prefix');
        const elThemeToggle = document.getElementById('theme-toggle');
        const elTypeGrid    = document.getElementById('type-grid');
        const elTicketRows  = document.getElementById('ticket-rows');
        const elAddTicket   = document.getElementById('add-ticket-btn');
        const elNoTicket    = document.getElementById('no-ticket');
        const elMarkRelease = document.getElementById('mark-release');
        const elDesc        = document.getElementById('desc-input');
        const outBranch     = document.getElementById('out-branch');
        const outCommit     = document.getElementById('out-commit');
        const commitNote    = document.getElementById('commit-multi-ticket-note');
        const outPr         = document.getElementById('out-pr');

        // Theme
        const toggleTheme = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('ostrom_theme', isDark ? 'dark' : 'light');
            document.getElementById('icon-sun').classList.toggle('hidden', !isDark);
            document.getElementById('icon-moon').classList.toggle('hidden', isDark);
        };
        (() => {
            const saved = localStorage.getItem('ostrom_theme');
            const sys   = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && sys)) {
                document.documentElement.classList.add('dark');
                document.getElementById('icon-sun').classList.remove('hidden');
                document.getElementById('icon-moon').classList.add('hidden');
            }
        })();
        elThemeToggle.addEventListener('click', toggleTheme);

        // State
        const state = { username: '', ticketPrefix: 'SPRK-', type: '', noTicket: false, isRelease: false };

        // Settings — always remembered
        function updateForgetBtn() {
            const hasSaved = localStorage.getItem('ostrom_user') !== null;
            document.getElementById('forget-btn').classList.toggle('hidden', !hasSaved);
        }

        const initSettings = () => {
            const savedUser   = localStorage.getItem('ostrom_user');
            const savedPrefix = localStorage.getItem('ostrom_prefix');
            state.username    = savedUser || '';
            if (savedPrefix) {
                state.ticketPrefix = savedPrefix;
            } else {
                state.ticketPrefix = 'SPRK-';
            }
            elUsername.value     = state.username;
            elGlobalPrefix.value = state.ticketPrefix;
            updateForgetBtn();
        };

        const handleSettingsChange = () => {
            const oldUser = elUsername.value;
            const newUser = oldUser.toLowerCase();
            if (oldUser !== newUser) {
                const isFocused = document.activeElement === elUsername;
                const s = elUsername.selectionStart, e = elUsername.selectionEnd;
                elUsername.value = newUser;
                if (isFocused) elUsername.setSelectionRange(s, e);
            }
            state.username = elUsername.value.trim();
            const rawPrefix  = elGlobalPrefix.value.trim().toUpperCase();
            state.ticketPrefix = rawPrefix || 'SPRK-';

            localStorage.setItem('ostrom_user',   state.username);
            localStorage.setItem('ostrom_prefix', state.ticketPrefix);
            updateForgetBtn();

            document.querySelectorAll('.ticket-prefix-display').forEach(el => { el.innerText = state.ticketPrefix; });
            triggerUpdate();
        };

        document.getElementById('forget-btn').addEventListener('click', () => {
            localStorage.removeItem('ostrom_user');
            localStorage.removeItem('ostrom_prefix');
            elUsername.value     = '';
            elGlobalPrefix.value = 'SPRK-';
            state.username       = '';
            state.ticketPrefix   = 'SPRK-';
            document.querySelectorAll('.ticket-prefix-display').forEach(el => { el.innerText = 'SPRK-'; });
            updateForgetBtn();
            triggerUpdate();
        });

        elUsername.addEventListener('input', handleSettingsChange);
        elGlobalPrefix.addEventListener('input', handleSettingsChange);

        // Type grid — examples are read-only (not clickable)
        const renderTypes = () => {
            elTypeGrid.innerHTML = '';
            changeTypes.forEach(t => {
                const wrapper = document.createElement('div');
                wrapper.className = 'relative flex flex-col h-full';

                const btn = document.createElement('button');
                btn.className = `w-full text-left p-3 rounded-lg border transition-all h-full
                    ${state.type === t.id ? 'border-focus ring-1 ring-focus bg-surface' : 'border-border bg-card hover:border-focus'}`;
                btn.innerHTML = `<div class="font-bold text-main">${t.title}</div><div class="text-xs text-muted mt-0.5">${t.sub}</div>`;
                btn.onclick = () => { state.type = t.id; renderTypes(); triggerUpdate(); };

                const infoIcon = document.createElement('div');
                infoIcon.className = 'absolute top-2 right-2 text-muted hover:text-primary cursor-help z-10 peer p-1';
                infoIcon.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
                infoIcon.addEventListener('click', e => e.stopPropagation());

                const tooltip = document.createElement('div');
                tooltip.className = 'info-tooltip hidden flex-col gap-2 absolute left-0 top-full mt-2 w-64 z-20 bg-card border border-border shadow-xl rounded-lg p-3';
                tooltip.innerHTML = `<span class="text-[10px] font-bold text-muted uppercase tracking-wider">Examples</span>`;
                tooltip.addEventListener('click', e => e.stopPropagation());

                const examplesContainer = document.createElement('div');
                examplesContainer.className = 'flex flex-wrap gap-1.5';

                typeExamples[t.id].forEach(ex => {
                    const tag = document.createElement('span');
                    // Read-only — no onclick, no hover effect, cursor-default
                    tag.className = 'text-xs bg-surface text-muted py-1 px-2 rounded border border-border font-mono select-text cursor-default';
                    tag.innerText = ex;
                    examplesContainer.appendChild(tag);
                });

                tooltip.appendChild(examplesContainer);
                wrapper.appendChild(btn);
                wrapper.appendChild(infoIcon);
                wrapper.appendChild(tooltip);
                elTypeGrid.appendChild(wrapper);
            });
        };

        // Ticket rows
        const createTicketRow = () => {
            const row = document.createElement('div');
            row.className = 'flex gap-2 ticket-row';
            row.innerHTML = `
                <div class="flex items-center w-full bg-card border border-border rounded-md overflow-hidden focus-within:border-focus focus-within:ring-1 focus-within:ring-focus transition-all">
                    <span class="ticket-prefix-display bg-surface text-muted px-3 py-3 border-r border-border select-none font-mono text-sm h-full flex items-center">${state.ticketPrefix}</span>
                    <input type="text" class="w-full bg-transparent outline-none px-3 py-2 uppercase font-mono text-sm" placeholder="123">
                </div>
                <button class="remove-ticket-btn p-2 text-muted hover:text-[#ef4444] transition-colors rounded-md hover:bg-[#ef4444]/10 hidden" title="Remove ticket">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>`;
            row.querySelector('input').addEventListener('input', triggerUpdate);
            row.querySelector('.remove-ticket-btn').addEventListener('click', () => { row.remove(); updateRemoveButtons(); triggerUpdate(); });
            return row;
        };

        const updateRemoveButtons = () => {
            const rows = elTicketRows.querySelectorAll('.ticket-row');
            elTicketRows.querySelectorAll('.remove-ticket-btn').forEach(btn => btn.classList.toggle('hidden', rows.length <= 1));
        };

        elAddTicket.addEventListener('click', () => { elTicketRows.appendChild(createTicketRow()); updateRemoveButtons(); triggerUpdate(); });
        elNoTicket.addEventListener('change', (e) => { state.noTicket = e.target.checked; document.getElementById('ticket-section').style.display = state.noTicket ? 'none' : 'flex'; triggerUpdate(); });
        elMarkRelease.addEventListener('change', (e) => { state.isRelease = e.target.checked; triggerUpdate(); });
        elDesc.addEventListener('input', triggerUpdate);

        const slugify        = (text) => text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
        const capitalizeFirst = (str)  => str ? str.charAt(0).toUpperCase() + str.slice(1) : '';

        // Validation
        function isVCValid() {
            if (!state.type) return false;
            if (!elDesc.value.trim()) return false;
            if (!state.noTicket) {
                const ticketInputs = elTicketRows.querySelectorAll('input[type="text"]');
                if (![...ticketInputs].some(i => i.value.trim())) return false;
            }
            return true;
        }

        function triggerUpdate() {
            // Auto-capitalize description
            const oldDesc = elDesc.value;
            const newDesc = capitalizeFirst(oldDesc);
            if (oldDesc !== newDesc) {
                const isFocused = document.activeElement === elDesc;
                const s = elDesc.selectionStart, e = elDesc.selectionEnd;
                elDesc.value = newDesc;
                if (isFocused) elDesc.setSelectionRange(s, e);
            }

            const type      = state.type || '{type}';
            const user      = state.username || '{user}';
            const descRaw   = elDesc.value.trim();
            const descSlug  = slugify(descRaw) || '{short-description}';

            const inputs = elTicketRows.querySelectorAll('input[type="text"]');
            const validTickets = [];
            inputs.forEach(inp => { const v = inp.value.trim(); if (v) validTickets.push((state.ticketPrefix + v).toUpperCase()); });

            let branch = `${user}/${type}/`;
            if (!state.noTicket && validTickets.length > 0) branch += validTickets.join('_') + '-';
            branch += descSlug;
            outBranch.innerText = branch;

            let commit = '';
            if (state.noTicket) {
                commit = `${type}: ${descRaw ? capitalizeFirst(descRaw) : '{Imperative description}'}`;
                commitNote.classList.add('hidden');
            } else {
                commit += (validTickets.length > 0 ? validTickets[0] : '{TICKET}') + ' ';
                commitNote.classList.toggle('hidden', validTickets.length <= 1);
                if (validTickets.length === 0) commitNote.classList.add('hidden');
                commit += descRaw ? capitalizeFirst(descRaw) : '{Imperative description}';
            }
            outCommit.innerText = commit;

            let pr = '';
            if (state.noTicket) {
                pr = `${type}: ${descRaw ? capitalizeFirst(descRaw) : '{Imperative description}'}`;
            } else {
                pr += (validTickets.length > 0 ? validTickets.join(' ') : '{TICKET}') + ' ';
                pr += descRaw ? capitalizeFirst(descRaw) : '{Imperative description}';
            }
            if (state.isRelease) pr += ' (release)';
            outPr.innerText = pr;

            // Enable/disable copy buttons based on form completeness
            const valid = isVCValid();
            document.querySelectorAll('.copy-btn').forEach(btn => { btn.disabled = !valid; });
        }

        // Copy
        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.disabled) return;
                const text = document.getElementById(btn.getAttribute('data-target')).innerText;
                const showCopied = () => {
                    const orig = btn.innerText;
                    btn.innerText = 'Copied! ✓';
                    btn.classList.replace('bg-primary', 'bg-emerald-500');
                    btn.classList.replace('hover:bg-blue-600', 'hover:bg-emerald-600');
                    setTimeout(() => { btn.innerText = orig; btn.classList.replace('bg-emerald-500', 'bg-primary'); btn.classList.replace('hover:bg-emerald-600', 'hover:bg-blue-600'); }, 1800);
                };
                const fallbackCopy = () => {
                    const ta = document.createElement('textarea');
                    ta.value = text; ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
                    document.body.appendChild(ta); ta.select();
                    try { document.execCommand('copy'); showCopied(); } catch(e) { console.error(e); }
                    document.body.removeChild(ta);
                };
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text).then(showCopied).catch(fallbackCopy);
                } else { fallbackCopy(); }
            });
        });

        initSettings();
        renderTypes();
        elTicketRows.appendChild(createTicketRow());
        updateRemoveButtons();
        triggerUpdate();

        const d = new Date(document.lastModified);
        document.getElementById('last-updated').textContent = d.toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        renderToolChangelog('tool-changelog');
    </script>
</body>
</html>
