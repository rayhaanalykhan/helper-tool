<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helper Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { main: 'var(--bg-main)', card: 'var(--bg-card)', surface: 'var(--bg-surface)', primary: 'var(--primary)', muted: 'var(--text-muted)', border: 'var(--border-color)', focus: 'var(--border-focus)' }, textColor: { main: 'var(--text-main)' } } }
        }
    </script>
    <style>
        :root { --bg-main:#f9fafb;--bg-card:#ffffff;--bg-surface:#f3f4f6;--text-main:#111827;--text-muted:#6b7280;--border-color:#e5e7eb;--border-focus:#3b82f6;--primary:#3b82f6; }
        html.dark { --bg-main:#0f172a;--bg-card:#1e293b;--bg-surface:#334155;--text-main:#f8fafc;--text-muted:#94a3b8;--border-color:#475569;--border-focus:#60a5fa;--primary:#3b82f6; }
        body { background:var(--bg-main);color:var(--text-main);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;transition:background-color 0.2s,color 0.2s; }
        .tool-card { background:var(--bg-card);border:1px solid var(--border-color);transition:border-color 0.2s,box-shadow 0.2s; }
        .tool-card:hover { border-color:var(--border-focus);box-shadow:0 4px 16px rgba(59,130,246,0.1); }
        .nav-tab-active { background:var(--bg-card);border:1px solid var(--border-color);color:var(--text-main);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,0.05); }
        .nav-tab-idle { color:var(--text-muted); }
        .nav-tab-idle:hover { color:var(--text-main); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto space-y-8">

        <header class="flex justify-between items-center bg-card rounded-xl border border-border shadow-sm" style="height:3.5rem;padding:0 1rem;">
            <div class="flex items-center gap-3 flex-wrap">
                <h1 class="text-base font-bold text-main whitespace-nowrap">Helper Tools</h1>
                <div class="flex items-center bg-surface rounded-lg p-0.5 border border-border gap-0.5">
                    <a href="version-control.html" class="nav-tab-idle px-3 py-1 rounded-md text-sm transition-colors flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
                        Version Control
                    </a>
                    <a href="release-notes.html" class="nav-tab-idle px-3 py-1 rounded-md text-sm transition-colors flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        Release Notes
                    </a>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="theme-toggle" class="p-1.5 rounded-md text-muted hover:text-main hover:bg-surface transition-colors" title="Toggle theme">
                    <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    <svg id="icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                </button>
            </div>
        </header>

        <!-- Welcome banner (shown when logged in and welcome message set) -->
        <div id="welcome-banner" class="hidden bg-card rounded-xl border border-border shadow-sm px-5 py-4">
            <p id="welcome-text" class="text-sm font-medium text-main"></p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">

            <a href="version-control.html" class="tool-card rounded-xl p-6 block group">
                <div class="flex items-start gap-4">
                    <div class="p-2.5 rounded-lg bg-surface shrink-0">
                        <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
                    </div>
                    <div>
                        <h2 class="font-bold text-main text-base group-hover:text-primary transition-colors">Version Control Helper</h2>
                        <p class="text-sm text-muted mt-1">Generate branch names, commit messages, and PR titles from ticket info.</p>
                    </div>
                </div>
                <div class="mt-4 flex items-center gap-1 text-xs font-semibold text-primary">
                    Open tool
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
                </div>
            </a>

            <a href="release-notes.html" class="tool-card rounded-xl p-6 block group">
                <div class="flex items-start gap-4">
                    <div class="p-2.5 rounded-lg bg-surface shrink-0">
                        <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    </div>
                    <div>
                        <h2 class="font-bold text-main text-base group-hover:text-primary transition-colors">Release Notes</h2>
                        <p class="text-sm text-muted mt-1">Generate formatted release notes for Android and iOS app releases.</p>
                    </div>
                </div>
                <div class="mt-4 flex items-center gap-1 text-xs font-semibold text-primary">
                    Open tool
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
                </div>
            </a>

        </div>

        <p class="text-center text-xs pb-2" style="color:var(--text-muted);">Last released: <span id="last-updated"></span></p>

    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="shared.js?v=20260524-3"></script>
    <script>
        (function () {
            var saved = localStorage.getItem('ostrom_theme');
            var sys   = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && sys)) {
                document.documentElement.classList.add('dark');
                document.getElementById('icon-sun').classList.remove('hidden');
                document.getElementById('icon-moon').classList.add('hidden');
            }
        })();

        document.getElementById('theme-toggle').addEventListener('click', function () {
            var isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('ostrom_theme', isDark ? 'dark' : 'light');
            document.getElementById('icon-sun').classList.toggle('hidden', !isDark);
            document.getElementById('icon-moon').classList.toggle('hidden', isDark);
            var sbSun  = document.getElementById('ht-sb-sun');
            var sbMoon = document.getElementById('ht-sb-moon');
            var sbLbl  = document.getElementById('ht-sb-theme-lbl');
            if (sbSun)  sbSun.style.display  = isDark ? 'block' : 'none';
            if (sbMoon) sbMoon.style.display  = isDark ? 'none'  : 'block';
            if (sbLbl)  sbLbl.textContent     = isDark ? 'Dark'  : 'Light';
        });

        window.htOnAuthReady = function (auth) {
            if (!auth.user) return;
            var wm = window.htFirebase.db.collection('settings').doc('app').get()
                .then(function (snap) {
                    var msg = snap.exists ? (snap.data().welcomeMessage || '') : '';
                    if (msg) {
                        document.getElementById('welcome-text').textContent = 'Welcome to ' + msg + ' helper tool';
                        document.getElementById('welcome-banner').classList.remove('hidden');
                    }
                })
                .catch(function () {});
        };

        function formatDateAmPm(d) {
            var day = d.getDate();
            var suffix = [,'st','nd','rd'][((day % 100 - 20) % 10) | 0] || [,'st','nd','rd'][day % 100] || 'th';
            var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            var h = d.getHours(), min = String(d.getMinutes()).padStart(2, '0');
            var ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            return day + suffix + ' ' + months[d.getMonth()] + ' ' + d.getFullYear() + ', ' + String(h).padStart(2, '0') + ':' + min + ' ' + ampm;
        }
        document.getElementById('last-updated').textContent = formatDateAmPm(new Date(document.lastModified));
    </script>
</body>
</html>
