<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Release Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        main: 'var(--bg-main)',
                        card: 'var(--bg-card)',
                        surface: 'var(--bg-surface)',
                        primary: 'var(--primary)',
                        muted: 'var(--text-muted)',
                        border: 'var(--border-color)',
                        focus: 'var(--border-focus)',
                    },
                    textColor: {
                        main: 'var(--text-main)',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-main: #f9fafb;
            --bg-card: #ffffff;
            --bg-surface: #f3f4f6;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --border-focus: #3b82f6;
            --primary: #3b82f6;
        }

        html.dark {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-surface: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #475569;
            --border-focus: #60a5fa;
            --primary: #3b82f6;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            transition: background-color 0.2s, color 0.2s;
        }

        .input-base {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            transition: all 0.2s;
        }

        .input-base:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 1px var(--border-focus);
        }

        .mono-output {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            padding: 0.75rem;
            font-size: 0.875rem;
            word-break: break-all;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">

        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-card p-4 rounded-xl border border-border shadow-sm">
            <div class="flex items-center gap-3">
                <a href="index.html" class="p-1.5 rounded-md text-muted hover:text-main hover:bg-surface transition-colors" title="Back to Home">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </a>
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Release Notes
                </h1>
            </div>

            <button id="theme-toggle" class="p-1.5 rounded-md text-muted hover:text-main hover:bg-surface transition-colors" title="Toggle Dark/Light Mode">
                <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <svg id="icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

            <!-- LEFT COLUMN: Inputs -->
            <div class="space-y-6 bg-card p-6 rounded-xl border border-border shadow-sm">

                <!-- 1. Platform -->
                <div class="space-y-3">
                    <label class="block text-sm font-bold uppercase tracking-wider text-muted">1. Platform</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button id="rn-btn-android"
                            class="w-full text-left p-3 rounded-lg border transition-all border-focus ring-1 ring-focus bg-surface"
                            onclick="rnSetPlatform('android')">
                            <div class="font-bold text-main">Android</div>
                        </button>
                        <button id="rn-btn-ios"
                            class="w-full text-left p-3 rounded-lg border transition-all border-border bg-card hover:border-focus"
                            onclick="rnSetPlatform('ios')">
                            <div class="font-bold text-main">iOS</div>
                        </button>
                    </div>
                </div>

                <!-- 2. App Name -->
                <div class="space-y-2">
                    <label class="block text-sm font-bold uppercase tracking-wider text-muted">2. App Name</label>
                    <input type="text" id="rn-app-name" class="input-base w-full rounded-md p-3" placeholder="e.g. Spark Energy">
                </div>

                <!-- 3. Version -->
                <div class="space-y-2">
                    <label id="rn-version-label" class="block text-sm font-bold uppercase tracking-wider text-muted">3. Version</label>
                    <input type="text" id="rn-version" class="input-base w-full rounded-md p-3" placeholder="e.g. 9.0.0">
                    <div id="rn-build-wrap" class="hidden space-y-2 mt-2">
                        <label class="block text-sm font-bold uppercase tracking-wider text-muted">Build Number</label>
                        <input type="text" id="rn-build" class="input-base w-full rounded-md p-3" placeholder="e.g. 25">
                    </div>
                </div>

                <!-- 4. Environment -->
                <div class="space-y-2">
                    <label class="block text-sm font-bold uppercase tracking-wider text-muted">4. Environment</label>
                    <select id="rn-env" class="input-base w-full rounded-md p-3 appearance-none cursor-pointer">
                        <option value="Dev">Dev</option>
                        <option value="Staging">Staging</option>
                        <option value="UAT">UAT</option>
                        <option value="Production">Production</option>
                    </select>
                </div>

                <!-- 5. Features -->
                <div class="space-y-3">
                    <label class="block text-sm font-bold uppercase tracking-wider text-muted">5. Features</label>
                    <div id="rn-feature-rows" class="flex flex-col gap-2"></div>
                    <button id="rn-add-feature" class="text-sm font-medium self-start text-muted hover:text-main hover:underline transition-colors">+ Add feature</button>
                </div>

                <!-- 6. Patches -->
                <div class="space-y-3">
                    <label class="block text-sm font-bold uppercase tracking-wider text-muted">6. Patches</label>
                    <div id="rn-patch-rows" class="flex flex-col gap-2"></div>
                    <button id="rn-add-patch" class="text-sm font-medium self-start text-muted hover:text-main hover:underline transition-colors">+ Add patch</button>
                </div>

                <!-- 7. APK Link (Android only) -->
                <div id="rn-apk-wrap" class="space-y-2">
                    <label class="block text-sm font-bold uppercase tracking-wider text-muted">7. APK Link</label>
                    <input type="text" id="rn-apk" class="input-base w-full rounded-md p-3" placeholder="https://...">
                </div>

            </div>

            <!-- RIGHT COLUMN: Output -->
            <div class="space-y-6 lg:sticky lg:top-8 self-start">
                <div class="bg-card p-5 rounded-xl border border-border shadow-sm">
                    <div class="flex justify-between items-end mb-2">
                        <label class="font-bold text-sm text-muted uppercase tracking-wider">Release Notes</label>
                        <button id="rn-copy-btn" class="text-xs bg-primary hover:bg-blue-600 text-white py-1 px-3 rounded transition-colors">Copy</button>
                    </div>
                    <div id="rn-output" class="mono-output min-h-[8rem] leading-relaxed"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Theme
        const toggleTheme = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('ostrom_theme', isDark ? 'dark' : 'light');
            document.getElementById('icon-sun').classList.toggle('hidden', !isDark);
            document.getElementById('icon-moon').classList.toggle('hidden', isDark);
        };

        const initTheme = () => {
            const savedTheme = localStorage.getItem('ostrom_theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.classList.add('dark');
                document.getElementById('icon-sun').classList.remove('hidden');
                document.getElementById('icon-moon').classList.add('hidden');
            }
        };

        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
        initTheme();

        // State
        const rnState = { platform: 'android' };

        const RN_BTN_ACTIVE = ['border-focus', 'ring-1', 'ring-focus', 'bg-surface'];
        const RN_BTN_IDLE   = ['border-border', 'bg-card', 'hover:border-focus'];

        function rnSetPlatform(platform) {
            rnState.platform = platform;
            const isAndroid = platform === 'android';
            const androidBtn = document.getElementById('rn-btn-android');
            const iosBtn     = document.getElementById('rn-btn-ios');
            RN_BTN_ACTIVE.forEach(c => { androidBtn.classList.toggle(c, isAndroid);  iosBtn.classList.toggle(c, !isAndroid); });
            RN_BTN_IDLE.forEach(c   => { androidBtn.classList.toggle(c, !isAndroid); iosBtn.classList.toggle(c, isAndroid);  });
            document.getElementById('rn-version-label').textContent =
                isAndroid ? '3. Version' : '3. Testflight Version';
            document.getElementById('rn-build-wrap').classList.toggle('hidden', isAndroid);
            document.getElementById('rn-apk-wrap').classList.toggle('hidden', !isAndroid);
            rnUpdate();
        }

        function createRnRow(containerEl) {
            const row = document.createElement('div');
            row.className = 'flex gap-2 rn-row';

            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'input-base rounded-md p-3 flex-1';
            input.placeholder = 'Enter item...';
            input.addEventListener('input', rnUpdate);

            const removeBtn = document.createElement('button');
            removeBtn.className = 'p-2 text-muted hover:text-[#ef4444] transition-colors rounded-md hover:bg-[#ef4444]/10 hidden';
            removeBtn.title = 'Remove';
            removeBtn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
            removeBtn.addEventListener('click', () => {
                row.remove();
                rnUpdateRowButtons(containerEl);
                rnUpdate();
            });

            row.appendChild(input);
            row.appendChild(removeBtn);
            return row;
        }

        function rnUpdateRowButtons(containerEl) {
            const rows = containerEl.querySelectorAll('.rn-row');
            containerEl.querySelectorAll('.rn-row button').forEach(btn => {
                btn.classList.toggle('hidden', rows.length <= 1);
            });
        }

        function rnUpdate() {
            const platform = rnState.platform;
            const appName  = document.getElementById('rn-app-name').value.trim();
            const version  = document.getElementById('rn-version').value.trim();
            const build    = document.getElementById('rn-build').value.trim();
            const env      = document.getElementById('rn-env').value;
            const apk      = document.getElementById('rn-apk').value.trim();

            const features = [...document.querySelectorAll('#rn-feature-rows .rn-row input')].map(i => i.value.trim()).filter(Boolean);
            const patches  = [...document.querySelectorAll('#rn-patch-rows .rn-row input')].map(i => i.value.trim()).filter(Boolean);

            const platformLabel = platform === 'android' ? 'Android' : 'iOS';
            const appLine  = `App Name: ${appName || '{App Name}'} - ${platformLabel}`;
            const verLabel = platform === 'ios' ? 'Testflight Version' : 'Version';
            const verValue = platform === 'ios' && build
                ? `${version || '{version}'} (${build})`
                : (version || '{version}');
            const verLine  = `${verLabel}: ${verValue}`;
            const envLine  = `Environment: ${env}`;

            let html = `${appLine}<br>${verLine}<br>${envLine}<br><br>`;
            html += `<strong><u>Release notes:</u></strong><br><br>`;

            if (features.length > 0) {
                html += `<strong>Features:</strong><br>`;
                html += features.join('<br>') + '<br>';
                if (patches.length > 0 || (platform === 'android' && apk)) html += '<br>';
            }

            if (patches.length > 0) {
                html += `<strong>Patches:</strong><br>`;
                html += patches.join('<br>') + '<br>';
                if (platform === 'android' && apk) html += '<br>';
            }

            if (platform === 'android' && apk) {
                html += `APK Link:<br>${apk}`;
            }

            document.getElementById('rn-output').innerHTML = html;
        }

        // Wire inputs
        document.getElementById('rn-app-name').addEventListener('input', rnUpdate);
        document.getElementById('rn-version').addEventListener('input', rnUpdate);
        document.getElementById('rn-build').addEventListener('input', rnUpdate);
        document.getElementById('rn-env').addEventListener('change', rnUpdate);
        document.getElementById('rn-apk').addEventListener('input', rnUpdate);

        document.getElementById('rn-add-feature').addEventListener('click', () => {
            const c = document.getElementById('rn-feature-rows');
            c.appendChild(createRnRow(c));
            rnUpdateRowButtons(c);
            rnUpdate();
        });

        document.getElementById('rn-add-patch').addEventListener('click', () => {
            const c = document.getElementById('rn-patch-rows');
            c.appendChild(createRnRow(c));
            rnUpdateRowButtons(c);
            rnUpdate();
        });

        // Copy button
        document.getElementById('rn-copy-btn').addEventListener('click', () => {
            const btn  = document.getElementById('rn-copy-btn');
            const text = document.getElementById('rn-output').innerText;

            const showCopied = () => {
                const orig = btn.innerText;
                btn.innerText = 'Copied! ✓';
                btn.classList.replace('bg-primary', 'bg-emerald-500');
                btn.classList.replace('hover:bg-blue-600', 'hover:bg-emerald-600');
                setTimeout(() => {
                    btn.innerText = orig;
                    btn.classList.replace('bg-emerald-500', 'bg-primary');
                    btn.classList.replace('hover:bg-emerald-600', 'hover:bg-blue-600');
                }, 1800);
            };

            const fallbackCopy = () => {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); showCopied(); }
                catch (e) { console.error('Fallback copy failed', e); }
                document.body.removeChild(ta);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(showCopied).catch(() => fallbackCopy());
            } else {
                fallbackCopy();
            }
        });

        // Init
        const rnFeatureCont = document.getElementById('rn-feature-rows');
        const rnPatchCont   = document.getElementById('rn-patch-rows');
        rnFeatureCont.appendChild(createRnRow(rnFeatureCont));
        rnPatchCont.appendChild(createRnRow(rnPatchCont));
        rnSetPlatform('android');
    </script>
</body>
</html>
