<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Release Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        main: 'var(--bg-main)',
                        card: 'var(--bg-card)',
                        surface: 'var(--bg-surface)',
                        primary: 'var(--primary)',
                        muted: 'var(--text-muted)',
                        border: 'var(--border-color)',
                        focus: 'var(--border-focus)',
                    },
                    textColor: { main: 'var(--text-main)' }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-main: #f9fafb;
            --bg-card: #ffffff;
            --bg-surface: #f3f4f6;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --border-focus: #3b82f6;
            --primary: #3b82f6;
        }
        html.dark {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-surface: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #475569;
            --border-focus: #60a5fa;
            --primary: #3b82f6;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            transition: background-color 0.2s, color 0.2s;
        }
        .input-base {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-base:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 1px var(--border-focus);
        }
        .input-error {
            border-color: #ef4444 !important;
            box-shadow: 0 0 0 1px #ef4444 !important;
        }
        .mono-output {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            line-height: 1.65;
            word-break: break-all;
        }
        .section-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.375rem;
        }
        .nav-tab-active {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-weight: 600;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .nav-tab-idle {
            color: var(--text-muted);
        }
        .nav-tab-idle:hover { color: var(--text-main); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6">

    <div class="max-w-6xl mx-auto space-y-4">

        <header class="flex justify-between items-center bg-card px-4 py-3 rounded-xl border border-border shadow-sm">
            <div class="flex items-center gap-3 flex-wrap">
                <h1 class="text-base font-bold text-main whitespace-nowrap">Helper Tools</h1>
                <div class="flex items-center bg-surface rounded-lg p-0.5 border border-border gap-0.5">
                    <a href="version-control.html" class="nav-tab-idle px-3 py-1 rounded-md text-sm transition-colors">Version Control</a>
                    <span class="nav-tab-active px-3 py-1 rounded-md text-sm">Release Notes</span>
                </div>
            </div>
            <button id="theme-toggle" class="p-1.5 rounded-md text-muted hover:text-main hover:bg-surface transition-colors" title="Toggle Dark/Light Mode">
                <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <svg id="icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">

            <!-- LEFT: Inputs -->
            <div class="bg-card p-5 rounded-xl border border-border shadow-sm space-y-4">

                <!-- Platform -->
                <div>
                    <span class="section-label">Platform</span>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="rn-btn-android" onclick="rnSetPlatform('android')"
                            class="p-2.5 rounded-lg border text-sm font-semibold transition-all border-focus ring-1 ring-focus bg-surface text-main">
                            Android
                        </button>
                        <button id="rn-btn-ios" onclick="rnSetPlatform('ios')"
                            class="p-2.5 rounded-lg border text-sm font-semibold transition-all border-border bg-card text-muted hover:border-focus">
                            iOS
                        </button>
                    </div>
                </div>

                <!-- App Name + Environment/Release -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="section-label" for="rn-app-name">App Name <span class="text-red-400">*</span></label>
                        <input id="rn-app-name" type="text" list="dl-app-names" autocomplete="off"
                            class="input-base w-full rounded-md px-3 py-2 text-sm" placeholder="e.g. Spark Energy">
                        <datalist id="dl-app-names"></datalist>
                    </div>
                    <div class="flex flex-col gap-2">
                        <div>
                            <label class="section-label" for="rn-env">Environment</label>
                            <select id="rn-env" class="input-base w-full rounded-md px-3 py-2 text-sm appearance-none cursor-pointer">
                                <option value="Dev">Dev</option>
                                <option value="QA">QA</option>
                                <option value="Prod">Prod</option>
                            </select>
                        </div>
                        <label class="flex items-center gap-2 text-sm cursor-pointer font-medium text-primary">
                            <input type="checkbox" id="rn-is-release" class="rounded border-border text-primary">
                            Release Build
                        </label>
                    </div>
                </div>

                <!-- Version + Build -->
                <div id="version-row" class="grid gap-3">
                    <div>
                        <label class="section-label" id="rn-version-label" for="rn-version">Version <span class="text-red-400">*</span></label>
                        <input id="rn-version" type="text" inputmode="decimal" list="dl-versions" autocomplete="off"
                            class="input-base w-full rounded-md px-3 py-2 text-sm" placeholder="e.g. 9.0.0">
                        <datalist id="dl-versions"></datalist>
                    </div>
                    <div id="rn-build-wrap" class="hidden">
                        <label class="section-label" for="rn-build">Build Number <span class="text-red-400">*</span></label>
                        <input id="rn-build" type="text" inputmode="numeric"
                            class="input-base w-full rounded-md px-3 py-2 text-sm" placeholder="e.g. 25">
                    </div>
                </div>

                <!-- Features + Patches -->
                <div class="grid grid-cols-2 gap-3">
                    <div class="flex flex-col gap-2">
                        <span class="section-label">Features <span class="text-red-400">*</span></span>
                        <div id="rn-feature-rows" class="flex flex-col gap-1.5"></div>
                        <button id="rn-add-feature" class="text-xs font-medium text-muted hover:text-main hover:underline transition-colors self-start">+ Add feature</button>
                    </div>
                    <div class="flex flex-col gap-2">
                        <span class="section-label">Patches <span class="text-red-400">*</span></span>
                        <div id="rn-patch-rows" class="flex flex-col gap-1.5"></div>
                        <button id="rn-add-patch" class="text-xs font-medium text-muted hover:text-main hover:underline transition-colors self-start">+ Add patch</button>
                    </div>
                </div>
                <p id="fp-error" class="hidden text-xs text-red-400 -mt-2">Add at least one feature or patch.</p>

                <!-- APK Link (Android only) -->
                <div id="rn-apk-wrap">
                    <label class="section-label" for="rn-apk">APK Link <span class="text-red-400">*</span></label>
                    <input id="rn-apk" type="text" class="input-base w-full rounded-md px-3 py-2 text-sm" placeholder="https://...">
                </div>

                <!-- Play Store URL (Android + release) -->
                <div id="rn-playstore-wrap" class="hidden">
                    <label class="section-label" for="rn-playstore">Play Store URL <span class="text-red-400">*</span></label>
                    <input id="rn-playstore" type="url" list="dl-playstore" autocomplete="off"
                        class="input-base w-full rounded-md px-3 py-2 text-sm" placeholder="https://play.google.com/...">
                    <datalist id="dl-playstore"></datalist>
                </div>

                <!-- App Store URL (iOS + release) -->
                <div id="rn-appstore-wrap" class="hidden">
                    <label class="section-label" for="rn-appstore">App Store URL <span class="text-red-400">*</span></label>
                    <input id="rn-appstore" type="url" list="dl-appstore" autocomplete="off"
                        class="input-base w-full rounded-md px-3 py-2 text-sm" placeholder="https://apps.apple.com/...">
                    <datalist id="dl-appstore"></datalist>
                </div>

                <!-- Clear saved data -->
                <button id="clear-history" class="text-xs text-muted hover:text-red-400 transition-colors underline self-start block">Clear saved data</button>

            </div>

            <!-- RIGHT: Output -->
            <div class="lg:sticky lg:top-6 self-start space-y-3">
                <div class="bg-card p-5 rounded-xl border border-border shadow-sm">
                    <div class="flex justify-between items-center mb-3">
                        <span class="font-bold text-sm text-muted uppercase tracking-wider">Preview</span>
                        <div class="flex items-center gap-2">
                            <span id="copy-error" class="hidden text-xs text-red-400">Fill required fields</span>
                            <button id="rn-copy-btn" class="text-xs bg-primary hover:bg-blue-600 text-white py-1.5 px-4 rounded-md transition-colors font-medium">Copy</button>
                        </div>
                    </div>
                    <div id="rn-output" class="mono-output min-h-[12rem]"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Theme
        document.getElementById('theme-toggle').addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('ostrom_theme', isDark ? 'dark' : 'light');
            document.getElementById('icon-sun').classList.toggle('hidden', !isDark);
            document.getElementById('icon-moon').classList.toggle('hidden', isDark);
        });
        (() => {
            const saved = localStorage.getItem('ostrom_theme');
            const sys   = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && sys)) {
                document.documentElement.classList.add('dark');
                document.getElementById('icon-sun').classList.remove('hidden');
                document.getElementById('icon-moon').classList.add('hidden');
            }
        })();

        // State
        const rnState = { platform: 'android', isRelease: false };

        // ── History / autocomplete ────────────────────────────────────────────
        const HIST = {
            appNames:     'rn_app_names',
            versions:     'rn_versions',
            playstoreUrls:'rn_playstore_urls',
            appstoreUrls: 'rn_appstore_urls',
        };

        function getHistory(key)          { return JSON.parse(localStorage.getItem(key) || '[]'); }
        function addToHistory(key, value, max = 5) {
            if (!value) return;
            let arr = getHistory(key);
            arr = [value, ...arr.filter(v => v !== value)].slice(0, max);
            localStorage.setItem(key, JSON.stringify(arr));
        }
        function refreshDatalist(dlId, key) {
            const dl = document.getElementById(dlId);
            if (!dl) return;
            dl.innerHTML = '';
            getHistory(key).forEach(v => { const o = document.createElement('option'); o.value = v; dl.appendChild(o); });
        }
        function refreshAllDatalists() {
            refreshDatalist('dl-app-names', HIST.appNames);
            refreshDatalist('dl-versions',  HIST.versions);
            refreshDatalist('dl-playstore', HIST.playstoreUrls);
            refreshDatalist('dl-appstore',  HIST.appstoreUrls);
        }

        // Save on blur
        document.getElementById('rn-app-name').addEventListener('blur', () => {
            addToHistory(HIST.appNames, document.getElementById('rn-app-name').value.trim());
            refreshDatalist('dl-app-names', HIST.appNames);
        });
        document.getElementById('rn-version').addEventListener('blur', () => {
            addToHistory(HIST.versions, document.getElementById('rn-version').value.trim());
            refreshDatalist('dl-versions', HIST.versions);
        });
        document.getElementById('rn-playstore').addEventListener('blur', () => {
            addToHistory(HIST.playstoreUrls, document.getElementById('rn-playstore').value.trim());
            refreshDatalist('dl-playstore', HIST.playstoreUrls);
        });
        document.getElementById('rn-appstore').addEventListener('blur', () => {
            addToHistory(HIST.appstoreUrls, document.getElementById('rn-appstore').value.trim());
            refreshDatalist('dl-appstore', HIST.appstoreUrls);
        });

        document.getElementById('clear-history').addEventListener('click', () => {
            Object.values(HIST).forEach(k => localStorage.removeItem(k));
            refreshAllDatalists();
        });

        // ── Platform ──────────────────────────────────────────────────────────
        const PLAT_ACTIVE = ['border-focus', 'ring-1', 'ring-focus', 'bg-surface', 'text-main'];
        const PLAT_IDLE   = ['border-border', 'bg-card', 'text-muted', 'hover:border-focus'];

        function rnSetPlatform(platform) {
            rnState.platform = platform;
            const isAndroid  = platform === 'android';
            const ab = document.getElementById('rn-btn-android');
            const ib = document.getElementById('rn-btn-ios');
            PLAT_ACTIVE.forEach(c => { ab.classList.toggle(c, isAndroid);  ib.classList.toggle(c, !isAndroid); });
            PLAT_IDLE.forEach(c   => { ab.classList.toggle(c, !isAndroid); ib.classList.toggle(c, isAndroid);  });

            document.getElementById('rn-version-label').innerHTML =
                (isAndroid ? 'Version' : 'Testflight Version') + ' <span class="text-red-400">*</span>';

            const versionRow = document.getElementById('version-row');
            versionRow.className = isAndroid ? 'grid gap-3' : 'grid grid-cols-2 gap-3';
            document.getElementById('rn-build-wrap').classList.toggle('hidden', isAndroid);

            document.getElementById('rn-apk-wrap').classList.toggle('hidden', !isAndroid);
            updateStoreUrlVisibility();
            rnUpdate();
        }

        // ── Release build ────────────────────────────────────────────────────
        function updateStoreUrlVisibility() {
            const isAndroid = rnState.platform === 'android';
            const isRelease = rnState.isRelease;
            document.getElementById('rn-playstore-wrap').classList.toggle('hidden', !(isAndroid && isRelease));
            document.getElementById('rn-appstore-wrap').classList.toggle('hidden', !(!isAndroid && isRelease));
        }

        document.getElementById('rn-is-release').addEventListener('change', function() {
            rnState.isRelease = this.checked;
            if (this.checked) {
                // Force Prod when release is checked
                document.getElementById('rn-env').value = 'Prod';
            }
            updateStoreUrlVisibility();
            rnUpdate();
        });

        // Prevent env change while release build is active
        document.getElementById('rn-env').addEventListener('change', function() {
            if (rnState.isRelease && this.value !== 'Prod') {
                this.value = 'Prod';
                alert('Release builds are always Production. Uncheck "Release Build" first to change the environment.');
            }
            rnUpdate();
        });

        // ── Input helpers ────────────────────────────────────────────────────
        function autoCapFirst(el) {
            const v = el.value;
            if (!v) return;
            const capped = v[0].toUpperCase() + v.slice(1);
            if (v !== capped) {
                const pos = el.selectionStart;
                el.value = capped;
                el.setSelectionRange(pos, pos);
            }
        }

        // Version: digits + dots only
        document.getElementById('rn-version').addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9.]/g, '');
            this.classList.remove('input-error');
            document.getElementById('copy-error').classList.add('hidden');
            rnUpdate();
        });

        // Build number: digits only
        document.getElementById('rn-build').addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
            this.classList.remove('input-error');
            document.getElementById('copy-error').classList.add('hidden');
            rnUpdate();
        });

        // App name: auto-capitalize + clear errors
        document.getElementById('rn-app-name').addEventListener('input', function() {
            autoCapFirst(this);
            this.classList.remove('input-error');
            document.getElementById('copy-error').classList.add('hidden');
            rnUpdate();
        });

        // APK + store URL: clear errors on input
        ['rn-apk', 'rn-playstore', 'rn-appstore'].forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                this.classList.remove('input-error');
                document.getElementById('copy-error').classList.add('hidden');
                rnUpdate();
            });
        });

        // ── Row factory ───────────────────────────────────────────────────────
        function createRnRow(containerEl, placeholder) {
            const row = document.createElement('div');
            row.className = 'flex gap-1.5 rn-row items-center';

            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'input-base rounded-md px-2.5 py-1.5 text-sm flex-1 min-w-0';
            input.placeholder = placeholder || 'Enter item...';
            input.addEventListener('input', function() {
                autoCapFirst(this);
                this.classList.remove('input-error');
                document.getElementById('fp-error').classList.add('hidden');
                document.getElementById('copy-error').classList.add('hidden');
                rnUpdate();
            });

            const removeBtn = document.createElement('button');
            removeBtn.className = 'p-1 text-muted hover:text-[#ef4444] transition-colors rounded hover:bg-[#ef4444]/10 hidden shrink-0';
            removeBtn.title = 'Remove';
            removeBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
            removeBtn.addEventListener('click', () => { row.remove(); rnUpdateRowButtons(containerEl); rnUpdate(); });

            row.appendChild(input);
            row.appendChild(removeBtn);
            return row;
        }

        function rnUpdateRowButtons(containerEl) {
            const rows = containerEl.querySelectorAll('.rn-row');
            containerEl.querySelectorAll('.rn-row button').forEach(btn => btn.classList.toggle('hidden', rows.length <= 1));
        }

        document.getElementById('rn-add-feature').addEventListener('click', () => {
            const c = document.getElementById('rn-feature-rows');
            c.appendChild(createRnRow(c, 'Feature...'));
            rnUpdateRowButtons(c); rnUpdate();
        });
        document.getElementById('rn-add-patch').addEventListener('click', () => {
            const c = document.getElementById('rn-patch-rows');
            c.appendChild(createRnRow(c, 'Patch...'));
            rnUpdateRowButtons(c); rnUpdate();
        });

        // ── Build output ──────────────────────────────────────────────────────
        function buildOutput() {
            const platform  = rnState.platform;
            const isAndroid = platform === 'android';
            const appName   = document.getElementById('rn-app-name').value.trim();
            const version   = document.getElementById('rn-version').value.trim();
            const build     = document.getElementById('rn-build').value.trim();
            const env       = document.getElementById('rn-env').value;
            const apk       = document.getElementById('rn-apk').value.trim();
            const playstore = document.getElementById('rn-playstore').value.trim();
            const appstore  = document.getElementById('rn-appstore').value.trim();
            const isRelease = rnState.isRelease;

            const features  = [...document.querySelectorAll('#rn-feature-rows .rn-row input')].map(i => i.value.trim()).filter(Boolean);
            const patches   = [...document.querySelectorAll('#rn-patch-rows .rn-row input')].map(i => i.value.trim()).filter(Boolean);

            const platformLabel = isAndroid ? 'Android' : 'iOS';
            const verLabel      = isAndroid ? 'Version' : 'Testflight Version';
            const verValue      = (!isAndroid && build) ? `${version} (${build})` : version;

            const appLine = `App Name: ${appName || '{App Name}'} - ${platformLabel}`;
            const verLine = `${verLabel}: ${verValue || '{version}'}`;
            const envLine = `Environment: ${env}`;

            // HTML (for rich-text clipboard)
            let html = `${appLine}<br>${verLine}<br>${envLine}<br><br>`;
            html += `<strong><u>Release notes:</u></strong><br><br>`;

            if (features.length > 0) {
                html += `<strong>Features:</strong><br>`;
                html += features.map(f => `• ${f}`).join('<br>') + '<br>';
                if (patches.length > 0 || (isAndroid && apk) || (isRelease && (playstore || appstore))) html += '<br>';
            }
            if (patches.length > 0) {
                html += `<strong>Patches:</strong><br>`;
                html += patches.map(p => `• ${p}`).join('<br>') + '<br>';
                if ((isAndroid && apk) || (isRelease && (playstore || appstore))) html += '<br>';
            }
            if (isAndroid && apk) {
                html += `APK Link:<br>${apk}`;
                if (isRelease && playstore) html += '<br><br>';
            }
            if (isAndroid && isRelease && playstore) {
                html += `Play Store:<br>${playstore}`;
            }
            if (!isAndroid && isRelease && appstore) {
                html += `App Store:<br>${appstore}`;
            }

            // Plain text (clipboard fallback)
            let plain = `${appLine}\n${verLine}\n${envLine}\n\nRelease notes:\n\n`;
            if (features.length > 0) {
                plain += `Features:\n${features.map(f => `• ${f}`).join('\n')}\n`;
                if (patches.length > 0 || (isAndroid && apk) || (isRelease && (playstore || appstore))) plain += '\n';
            }
            if (patches.length > 0) {
                plain += `Patches:\n${patches.map(p => `• ${p}`).join('\n')}\n`;
                if ((isAndroid && apk) || (isRelease && (playstore || appstore))) plain += '\n';
            }
            if (isAndroid && apk) {
                plain += `APK Link:\n${apk}`;
                if (isRelease && playstore) plain += '\n\n';
            }
            if (isAndroid && isRelease && playstore) plain += `Play Store:\n${playstore}`;
            if (!isAndroid && isRelease && appstore)  plain += `App Store:\n${appstore}`;

            return { html, plain, appName, version, build, apk, playstore, appstore, features, patches, isAndroid, isRelease };
        }

        function rnUpdate() {
            document.getElementById('rn-output').innerHTML = buildOutput().html;
        }

        // ── Validation ────────────────────────────────────────────────────────
        function validate() {
            const { appName, version, build, apk, playstore, appstore, features, patches, isAndroid, isRelease } = buildOutput();
            let ok = true;
            const mark = (id, bad) => document.getElementById(id).classList.toggle('input-error', bad);

            mark('rn-app-name',  !appName);
            mark('rn-version',   !version);
            if (!isAndroid)              mark('rn-build',     !build);
            if (isAndroid)               mark('rn-apk',       !apk);
            if (isAndroid && isRelease)  mark('rn-playstore', !playstore);
            if (!isAndroid && isRelease) mark('rn-appstore',  !appstore);

            if (!appName || !version)                      ok = false;
            if (!isAndroid && !build)                      ok = false;
            if (isAndroid  && !apk)                        ok = false;
            if (isAndroid  && isRelease && !playstore)     ok = false;
            if (!isAndroid && isRelease && !appstore)      ok = false;

            const noItems = features.length === 0 && patches.length === 0;
            document.getElementById('fp-error').classList.toggle('hidden', !noItems);
            if (noItems) ok = false;

            document.getElementById('copy-error').classList.toggle('hidden', ok);
            return ok;
        }

        // ── Copy ──────────────────────────────────────────────────────────────
        document.getElementById('rn-copy-btn').addEventListener('click', async () => {
            if (!validate()) return;

            const btn = document.getElementById('rn-copy-btn');
            const { html, plain, appName, version, playstore, appstore, isAndroid, isRelease } = buildOutput();

            const showCopied = () => {
                const orig = btn.textContent;
                btn.textContent = 'Copied! ✓';
                btn.classList.replace('bg-primary', 'bg-emerald-500');
                btn.classList.replace('hover:bg-blue-600', 'hover:bg-emerald-600');
                setTimeout(() => {
                    btn.textContent = orig;
                    btn.classList.replace('bg-emerald-500', 'bg-primary');
                    btn.classList.replace('hover:bg-emerald-600', 'hover:bg-blue-600');
                }, 1800);
            };

            // Save to history on successful copy
            addToHistory(HIST.appNames, appName);
            addToHistory(HIST.versions, version);
            if (isAndroid && isRelease) addToHistory(HIST.playstoreUrls, playstore);
            if (!isAndroid && isRelease) addToHistory(HIST.appstoreUrls, appstore);
            refreshAllDatalists();

            const fullHtml = `<!DOCTYPE html><html><body>${html}</body></html>`;
            try {
                if (navigator.clipboard && window.ClipboardItem) {
                    await navigator.clipboard.write([new ClipboardItem({
                        'text/html':  new Blob([fullHtml], { type: 'text/html' }),
                        'text/plain': new Blob([plain],   { type: 'text/plain' }),
                    })]);
                } else {
                    await navigator.clipboard.writeText(plain);
                }
                showCopied();
            } catch {
                const ta = document.createElement('textarea');
                ta.value = plain; ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
                document.body.appendChild(ta); ta.select();
                try { document.execCommand('copy'); showCopied(); } catch(e) { console.error(e); }
                document.body.removeChild(ta);
            }
        });

        // ── Init ──────────────────────────────────────────────────────────────
        refreshAllDatalists();
        const fc = document.getElementById('rn-feature-rows');
        const pc = document.getElementById('rn-patch-rows');
        fc.appendChild(createRnRow(fc, 'Feature...'));
        pc.appendChild(createRnRow(pc, 'Patch...'));
        rnSetPlatform('android');
    </script>
</body>
</html>
