<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Release Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        main: 'var(--bg-main)',
                        card: 'var(--bg-card)',
                        surface: 'var(--bg-surface)',
                        primary: 'var(--primary)',
                        muted: 'var(--text-muted)',
                        border: 'var(--border-color)',
                        focus: 'var(--border-focus)',
                    },
                    textColor: { main: 'var(--text-main)' }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-main: #f9fafb;
            --bg-card: #ffffff;
            --bg-surface: #f3f4f6;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --border-focus: #3b82f6;
            --primary: #3b82f6;
        }
        html.dark {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-surface: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #475569;
            --border-focus: #60a5fa;
            --primary: #3b82f6;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            transition: background-color 0.2s, color 0.2s;
        }
        .input-base {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-base:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 1px var(--border-focus);
        }
        .input-error {
            border-color: #ef4444 !important;
            box-shadow: 0 0 0 1px #ef4444 !important;
        }
        .mono-output {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            line-height: 1.6;
            word-break: break-all;
        }
        .section-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.375rem;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6">

    <div class="max-w-6xl mx-auto space-y-4">

        <header class="flex justify-between items-center bg-card px-4 py-3 rounded-xl border border-border shadow-sm">
            <div class="flex items-center gap-3">
                <a href="index.html" class="p-1.5 rounded-md text-muted hover:text-main hover:bg-surface transition-colors" title="Back to Home">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </a>
                <h1 class="text-lg font-bold flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Release Notes
                </h1>
            </div>
            <button id="theme-toggle" class="p-1.5 rounded-md text-muted hover:text-main hover:bg-surface transition-colors" title="Toggle Dark/Light Mode">
                <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <svg id="icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">

            <!-- LEFT: Inputs -->
            <div class="bg-card p-5 rounded-xl border border-border shadow-sm space-y-4">

                <!-- Platform -->
                <div>
                    <span class="section-label">Platform</span>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="rn-btn-android" onclick="rnSetPlatform('android')"
                            class="p-2.5 rounded-lg border text-sm font-semibold transition-all border-focus ring-1 ring-focus bg-surface text-main">
                            Android
                        </button>
                        <button id="rn-btn-ios" onclick="rnSetPlatform('ios')"
                            class="p-2.5 rounded-lg border text-sm font-semibold transition-all border-border bg-card text-muted hover:border-focus">
                            iOS
                        </button>
                    </div>
                </div>

                <!-- App Name + Environment -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="section-label" for="rn-app-name">App Name <span class="text-red-400">*</span></label>
                        <input id="rn-app-name" type="text" class="input-base w-full rounded-md px-3 py-2 text-sm" placeholder="e.g. Spark Energy">
                    </div>
                    <div>
                        <label class="section-label" for="rn-env">Environment</label>
                        <select id="rn-env" class="input-base w-full rounded-md px-3 py-2 text-sm appearance-none cursor-pointer">
                            <option>Dev</option>
                            <option>Staging</option>
                            <option>UAT</option>
                            <option>Production</option>
                        </select>
                    </div>
                </div>

                <!-- Version + Build -->
                <div id="version-row" class="grid gap-3">
                    <div>
                        <label class="section-label" id="rn-version-label" for="rn-version">Version <span class="text-red-400">*</span></label>
                        <input id="rn-version" type="text" class="input-base w-full rounded-md px-3 py-2 text-sm" placeholder="e.g. 9.0.0">
                    </div>
                    <div id="rn-build-wrap" class="hidden">
                        <label class="section-label" for="rn-build">Build Number <span class="text-red-400">*</span></label>
                        <input id="rn-build" type="text" class="input-base w-full rounded-md px-3 py-2 text-sm" placeholder="e.g. 25">
                    </div>
                </div>

                <!-- Features + Patches side by side -->
                <div class="grid grid-cols-2 gap-3">
                    <div class="flex flex-col gap-2">
                        <span class="section-label">Features <span class="text-red-400">*</span></span>
                        <div id="rn-feature-rows" class="flex flex-col gap-1.5"></div>
                        <button id="rn-add-feature" class="text-xs font-medium text-muted hover:text-main hover:underline transition-colors self-start">+ Add feature</button>
                    </div>
                    <div class="flex flex-col gap-2">
                        <span class="section-label">Patches <span class="text-red-400">*</span></span>
                        <div id="rn-patch-rows" class="flex flex-col gap-1.5"></div>
                        <button id="rn-add-patch" class="text-xs font-medium text-muted hover:text-main hover:underline transition-colors self-start">+ Add patch</button>
                    </div>
                </div>
                <p id="fp-error" class="hidden text-xs text-red-400 -mt-2">Add at least one feature or patch.</p>

                <!-- APK Link (Android only) -->
                <div id="rn-apk-wrap">
                    <label class="section-label" for="rn-apk">APK Link <span class="text-red-400">*</span></label>
                    <input id="rn-apk" type="text" class="input-base w-full rounded-md px-3 py-2 text-sm" placeholder="https://...">
                </div>

            </div>

            <!-- RIGHT: Output -->
            <div class="lg:sticky lg:top-6 self-start space-y-3">
                <div class="bg-card p-5 rounded-xl border border-border shadow-sm">
                    <div class="flex justify-between items-center mb-3">
                        <span class="font-bold text-sm text-muted uppercase tracking-wider">Preview</span>
                        <div class="flex items-center gap-2">
                            <span id="copy-error" class="hidden text-xs text-red-400">Fill required fields</span>
                            <button id="rn-copy-btn" class="text-xs bg-primary hover:bg-blue-600 text-white py-1.5 px-4 rounded-md transition-colors font-medium">Copy</button>
                        </div>
                    </div>
                    <div id="rn-output" class="mono-output min-h-[12rem]"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Theme
        document.getElementById('theme-toggle').addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('ostrom_theme', isDark ? 'dark' : 'light');
            document.getElementById('icon-sun').classList.toggle('hidden', !isDark);
            document.getElementById('icon-moon').classList.toggle('hidden', isDark);
        });
        (() => {
            const saved = localStorage.getItem('ostrom_theme');
            const sys   = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && sys)) {
                document.documentElement.classList.add('dark');
                document.getElementById('icon-sun').classList.remove('hidden');
                document.getElementById('icon-moon').classList.add('hidden');
            }
        })();

        // State
        const rnState = { platform: 'android' };

        const ACTIVE = ['border-focus', 'ring-1', 'ring-focus', 'bg-surface', 'text-main'];
        const IDLE   = ['border-border', 'bg-card', 'text-muted', 'hover:border-focus'];

        function rnSetPlatform(platform) {
            rnState.platform = platform;
            const isAndroid = platform === 'android';
            const ab = document.getElementById('rn-btn-android');
            const ib = document.getElementById('rn-btn-ios');
            ACTIVE.forEach(c => { ab.classList.toggle(c, isAndroid);  ib.classList.toggle(c, !isAndroid); });
            IDLE.forEach(c   => { ab.classList.toggle(c, !isAndroid); ib.classList.toggle(c, isAndroid);  });

            const versionLabel = document.getElementById('rn-version-label');
            versionLabel.innerHTML = isAndroid
                ? 'Version <span class="text-red-400">*</span>'
                : 'Testflight Version <span class="text-red-400">*</span>';

            const buildWrap = document.getElementById('rn-build-wrap');
            buildWrap.classList.toggle('hidden', isAndroid);

            const versionRow = document.getElementById('version-row');
            versionRow.className = isAndroid ? 'grid gap-3' : 'grid grid-cols-2 gap-3';

            document.getElementById('rn-apk-wrap').classList.toggle('hidden', !isAndroid);
            rnUpdate();
        }

        // Row factory
        function createRnRow(containerEl, placeholder) {
            const row = document.createElement('div');
            row.className = 'flex gap-1.5 rn-row items-center';

            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'input-base rounded-md px-2.5 py-1.5 text-sm flex-1 min-w-0';
            input.placeholder = placeholder || 'Enter item...';
            input.addEventListener('input', () => {
                input.classList.remove('input-error');
                document.getElementById('fp-error').classList.add('hidden');
                rnUpdate();
            });

            const removeBtn = document.createElement('button');
            removeBtn.className = 'p-1 text-muted hover:text-[#ef4444] transition-colors rounded hover:bg-[#ef4444]/10 hidden shrink-0';
            removeBtn.title = 'Remove';
            removeBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
            removeBtn.addEventListener('click', () => {
                row.remove();
                rnUpdateRowButtons(containerEl);
                rnUpdate();
            });

            row.appendChild(input);
            row.appendChild(removeBtn);
            return row;
        }

        function rnUpdateRowButtons(containerEl) {
            const rows = containerEl.querySelectorAll('.rn-row');
            containerEl.querySelectorAll('.rn-row button').forEach(btn => {
                btn.classList.toggle('hidden', rows.length <= 1);
            });
        }

        // Build output — returns { html, plain } for both preview and clipboard
        function buildOutput() {
            const platform = rnState.platform;
            const appName  = document.getElementById('rn-app-name').value.trim();
            const version  = document.getElementById('rn-version').value.trim();
            const build    = document.getElementById('rn-build').value.trim();
            const env      = document.getElementById('rn-env').value;
            const apk      = document.getElementById('rn-apk').value.trim();

            const features = [...document.querySelectorAll('#rn-feature-rows .rn-row input')].map(i => i.value.trim()).filter(Boolean);
            const patches  = [...document.querySelectorAll('#rn-patch-rows .rn-row input')].map(i => i.value.trim()).filter(Boolean);

            const isAndroid     = platform === 'android';
            const platformLabel = isAndroid ? 'Android' : 'iOS';
            const verLabel      = isAndroid ? 'Version' : 'Testflight Version';
            const verValue      = (!isAndroid && build) ? `${version} (${build})` : version;

            const appLine  = `App Name: ${appName || '{App Name}'} - ${platformLabel}`;
            const verLine  = `${verLabel}: ${verValue || '{version}'}`;
            const envLine  = `Environment: ${env}`;

            // HTML string (for rich-text clipboard + preview)
            let html = `${appLine}<br>${verLine}<br>${envLine}<br><br>`;
            html += `<strong><u>Release notes:</u></strong><br><br>`;
            if (features.length > 0) {
                html += `<strong>Features:</strong><br>${features.join('<br>')}<br>`;
                if (patches.length > 0 || (isAndroid && apk)) html += '<br>';
            }
            if (patches.length > 0) {
                html += `<strong>Patches:</strong><br>${patches.join('<br>')}<br>`;
                if (isAndroid && apk) html += '<br>';
            }
            if (isAndroid && apk) html += `APK Link:<br>${apk}`;

            // Plain-text string (clipboard fallback)
            let plain = `${appLine}\n${verLine}\nEnvironment: ${env}\n\nRelease notes:\n\n`;
            if (features.length > 0) {
                plain += `Features:\n${features.join('\n')}\n`;
                if (patches.length > 0 || (isAndroid && apk)) plain += '\n';
            }
            if (patches.length > 0) {
                plain += `Patches:\n${patches.join('\n')}\n`;
                if (isAndroid && apk) plain += '\n';
            }
            if (isAndroid && apk) plain += `APK Link:\n${apk}`;

            return { html, plain, appName, version, build, apk, features, patches, isAndroid };
        }

        function rnUpdate() {
            const { html } = buildOutput();
            document.getElementById('rn-output').innerHTML = html;
        }

        // Validation
        function validate() {
            const { appName, version, build, apk, features, patches, isAndroid } = buildOutput();
            let ok = true;

            const mark = (id, bad) => {
                const el = document.getElementById(id);
                el.classList.toggle('input-error', bad);
            };

            mark('rn-app-name', !appName);
            mark('rn-version',  !version);
            if (!isAndroid) mark('rn-build', !build);
            if (isAndroid)  mark('rn-apk',   !apk);

            if (!appName || !version) ok = false;
            if (!isAndroid && !build) ok = false;
            if (isAndroid  && !apk)   ok = false;

            const noItems = features.length === 0 && patches.length === 0;
            document.getElementById('fp-error').classList.toggle('hidden', !noItems);
            if (noItems) ok = false;

            document.getElementById('copy-error').classList.toggle('hidden', ok);
            return ok;
        }

        // Clear error on input
        ['rn-app-name', 'rn-version', 'rn-build', 'rn-apk'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                document.getElementById(id).classList.remove('input-error');
                document.getElementById('copy-error').classList.add('hidden');
                rnUpdate();
            });
        });
        document.getElementById('rn-env').addEventListener('change', rnUpdate);

        // Copy — rich HTML to clipboard so formatting pastes into Google Chat
        document.getElementById('rn-copy-btn').addEventListener('click', async () => {
            if (!validate()) return;

            const btn = document.getElementById('rn-copy-btn');
            const { html, plain } = buildOutput();

            const showCopied = () => {
                const orig = btn.textContent;
                btn.textContent = 'Copied! ✓';
                btn.classList.replace('bg-primary', 'bg-emerald-500');
                btn.classList.replace('hover:bg-blue-600', 'hover:bg-emerald-600');
                setTimeout(() => {
                    btn.textContent = orig;
                    btn.classList.replace('bg-emerald-500', 'bg-primary');
                    btn.classList.replace('hover:bg-emerald-600', 'hover:bg-blue-600');
                }, 1800);
            };

            const fullHtml = `<!DOCTYPE html><html><body>${html}</body></html>`;

            try {
                if (navigator.clipboard && window.ClipboardItem) {
                    await navigator.clipboard.write([new ClipboardItem({
                        'text/html': new Blob([fullHtml], { type: 'text/html' }),
                        'text/plain': new Blob([plain],   { type: 'text/plain' }),
                    })]);
                } else {
                    await navigator.clipboard.writeText(plain);
                }
                showCopied();
            } catch {
                // execCommand fallback
                const ta = document.createElement('textarea');
                ta.value = plain;
                ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); showCopied(); } catch (e) { console.error(e); }
                document.body.removeChild(ta);
            }
        });

        // Add row buttons
        document.getElementById('rn-add-feature').addEventListener('click', () => {
            const c = document.getElementById('rn-feature-rows');
            c.appendChild(createRnRow(c, 'Feature...'));
            rnUpdateRowButtons(c);
            rnUpdate();
        });
        document.getElementById('rn-add-patch').addEventListener('click', () => {
            const c = document.getElementById('rn-patch-rows');
            c.appendChild(createRnRow(c, 'Patch...'));
            rnUpdateRowButtons(c);
            rnUpdate();
        });

        // Init
        const fc = document.getElementById('rn-feature-rows');
        const pc = document.getElementById('rn-patch-rows');
        fc.appendChild(createRnRow(fc, 'Feature...'));
        pc.appendChild(createRnRow(pc, 'Patch...'));
        rnSetPlatform('android');
    </script>
</body>
</html>
