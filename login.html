<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — Helper Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        main:    'var(--bg-main)',
                        card:    'var(--bg-card)',
                        surface: 'var(--bg-surface)',
                        primary: 'var(--primary)',
                        muted:   'var(--text-muted)',
                        border:  'var(--border-color)',
                        focus:   'var(--border-focus)',
                    },
                    textColor: { main: 'var(--text-main)' }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-main: #f9fafb;
            --bg-card: #ffffff;
            --bg-surface: #f3f4f6;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --border-focus: #3b82f6;
            --primary: #3b82f6;
        }
        html.dark {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-surface: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #475569;
            --border-focus: #60a5fa;
            --primary: #3b82f6;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .input-base {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-base:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 1px var(--border-focus);
        }
        .input-error {
            border-color: #ef4444 !important;
            box-shadow: 0 0 0 1px #ef4444 !important;
        }
        .section-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.375rem;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm space-y-6">

        <!-- Logo / Brand -->
        <div class="text-center">
            <a href="index.html" class="text-lg font-bold" style="color:var(--text-main);text-decoration:none;">Helper Tools</a>
            <p class="text-sm mt-1" style="color:var(--text-muted);">Sign in to your account</p>
        </div>

        <!-- Card -->
        <div class="rounded-xl border p-8 shadow-sm space-y-5" style="background:var(--bg-card);border-color:var(--border-color);">

            <!-- Error banner -->
            <div id="login-error" class="hidden rounded-lg px-3 py-2.5 text-sm" style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#ef4444;"></div>

            <form id="login-form" class="space-y-4" novalidate>
                <div>
                    <label class="section-label" for="login-email">Email</label>
                    <input id="login-email" type="email" autocomplete="email" required
                        class="input-base w-full rounded-md px-3 py-2 text-sm" placeholder="you@example.com">
                </div>
                <div>
                    <label class="section-label" for="login-password">Password</label>
                    <input id="login-password" type="password" autocomplete="current-password" required
                        class="input-base w-full rounded-md px-3 py-2 text-sm" placeholder="••••••••">
                </div>
                <button type="submit" id="login-submit"
                    class="w-full py-2 rounded-md text-sm font-semibold text-white transition-opacity"
                    style="background:var(--primary);">
                    Sign in
                </button>
            </form>
        </div>

        <p class="text-center text-xs" style="color:var(--text-muted);">
            Don't have an account? Contact your administrator.
        </p>

    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script>
        // ── Theme ─────────────────────────────────────────────────────────────
        (function () {
            var saved = localStorage.getItem('ostrom_theme');
            var sys   = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && sys)) document.documentElement.classList.add('dark');
        })();

        // ── Firebase ──────────────────────────────────────────────────────────
        var FIREBASE_CONFIG = {
            apiKey:     'AIzaSyBO6TBjvtZE8_OdSsEH6c2_CKOB_4GMnnk',
            authDomain: 'helper-tool-tech.firebaseapp.com',
            projectId:  'helper-tool-tech'
        };
        var fbApp  = firebase.apps.length ? firebase.app() : firebase.initializeApp(FIREBASE_CONFIG);
        var fbAuth = firebase.auth(fbApp);

        var returnTo = sessionStorage.getItem('ht_return_to') || 'settings.html';

        // Redirect if already signed in
        fbAuth.onAuthStateChanged(function (user) {
            if (user) {
                sessionStorage.removeItem('ht_return_to');
                window.location.replace(returnTo);
            }
        });

        // ── Helpers ───────────────────────────────────────────────────────────
        function showError(msg) {
            var el = document.getElementById('login-error');
            el.textContent = msg;
            el.classList.remove('hidden');
        }
        function hideError() {
            document.getElementById('login-error').classList.add('hidden');
        }
        function friendlyError(code) {
            switch (code) {
                case 'auth/user-not-found':
                case 'auth/wrong-password':
                case 'auth/invalid-credential':
                case 'auth/invalid-email':
                    return 'Incorrect email or password.';
                case 'auth/too-many-requests':
                    return 'Too many attempts. Please try again later.';
                case 'auth/user-disabled':
                    return 'This account has been disabled.';
                default:
                    return 'Sign in failed. Please try again.';
            }
        }

        // ── Form submit ───────────────────────────────────────────────────────
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            hideError();

            var email    = document.getElementById('login-email').value.trim();
            var password = document.getElementById('login-password').value;
            var btn      = document.getElementById('login-submit');

            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }

            btn.disabled    = true;
            btn.textContent = 'Signing in…';
            btn.style.opacity = '0.7';

            fbAuth.signInWithEmailAndPassword(email, password)
                .then(function () {
                    sessionStorage.removeItem('ht_return_to');
                    window.location.replace(returnTo);
                })
                .catch(function (err) {
                    btn.disabled    = false;
                    btn.textContent = 'Sign in';
                    btn.style.opacity = '1';
                    showError(friendlyError(err.code));
                });
        });

        // Clear error on input
        ['login-email', 'login-password'].forEach(function (id) {
            document.getElementById(id).addEventListener('input', hideError);
        });
    </script>
</body>
</html>
